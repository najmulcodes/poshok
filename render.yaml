databases:
  - name: nevo-db
    databaseName: nevo
    user: nevo_user
    plan: free

services:
  - type: redis
    name: nevo-redis
    plan: free
    maxmemoryPolicy: allkeys-lru # Recommended for BullMQ

  - type: web
    name: nevo-api
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: "apps/api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nevo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nevo-redis
          property: connectionString
      - fromGroup: nevo-secrets

  - type: worker
    name: nevo-worker
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run worker" # Runs node dist/worker.js
    rootDir: "apps/api"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nevo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nevo-redis
          property: connectionString
      - fromGroup: nevo-secrets

cron:
  - label: Dispatch Notifications
    schedule: "* * * * *" # Every minute
    command: "curl -X POST -H \"Authorization: Bearer ${INTERNAL_CRON_SECRET}\" https://${RENDER_EXTERNAL_URL}/api/v1/internal/dispatch-notifications"

envVarGroups:
  - name: nevo-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INTERNAL_CRON_SECRET
        generateValue: true