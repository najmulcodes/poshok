# Single free-tier web service. Postgres and Redis are NOT provisioned by
# Render here (Render's own Postgres/Redis and its Background Worker/Cron
# service types all require a paid plan) — instead, DATABASE_URL/DIRECT_URL
# point at a free Supabase project, and REDIS_URL points at a free Upstash
# Redis database. Both are set as plain env vars in the Render dashboard
# (Environment tab), not generated by Render itself.
#
# The notification worker and its dispatch scheduler run inside this same
# web process (RUN_WORKER_INPROCESS=true) instead of as a separate paid
# worker service + cron job. See src/index.ts for how that's wired up.
#
# Caveat: Render's free web services spin down after ~15 minutes with no
# HTTP traffic, which pauses the in-process worker/scheduler too. Use a
# free uptime pinger (UptimeRobot, cron-job.org, etc.) hitting GET / every
# 5-10 minutes to keep the service awake if timely notifications matter.
services:
  - type: web
    name: nevo-api
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: "apps/api"
    envVars:
      - key: NODE_VERSION
        value: "22" # pinned explicitly — an open-ended engines range in package.json let Render pick a brand-new, untested major version (26.x) that broke the build in ways 22.x doesn't
      - key: RUN_WORKER_INPROCESS
        value: "true"
      - key: DATABASE_URL
        sync: false # set manually in the Render dashboard to your Supabase pooled connection string
      - key: DIRECT_URL
        sync: false # set manually to your Supabase direct (non-pooled) connection string
      - key: REDIS_URL
        sync: false # set manually to your Upstash rediss:// connection string
      - key: CORS_ORIGIN
        sync: false # e.g. https://nevocore.vercel.app
      - fromGroup: nevo-secrets

envVarGroups:
  - name: nevo-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INTERNAL_CRON_SECRET
        generateValue: true
